name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build static site
        run: bun run build || echo "build exited nonzero - checking output anyway"
        env:
          NITRO_PRESET: github_pages

      - name: Prepare output
        id: out
        run: |
          if [ -d .output/public ]; then dir=.output/public
          elif [ -d dist/public ]; then dir=dist/public
          else dir=dist; fi
          if [ ! -f "$dir/index.html" ]; then
            for f in "$dir/TheBraidExpo/index.html" "$dir/_shell.html" "$dir/_shell/index.html"; do
              if [ -f "$f" ]; then cp "$f" "$dir/index.html"; break; fi
            done
          fi
          if [ ! -f "$dir/index.html" ]; then
            echo "No index.html was produced - build truly failed"
            find "$dir" -maxdepth 2 -name "*.html" -print
            exit 1
          fi
          echo "dir=$dir" >> "$GITHUB_OUTPUT"
          cp "$dir/index.html" "$dir/404.html" 2>/dev/null || true
          touch "$dir/.nojekyll"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.out.outputs.dir }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
